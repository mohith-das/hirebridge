version: "3.8"

services:
  hirebridge:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HB_BASE_URL=http://localhost:8080
      - HB_DB_PATH=/data/hirebridge.db
      - HB_VEC0_PATH=/app/ext/vec0.so
      - HB_EMBED_DIM=384
      - HB_RESEND_API_KEY=
    volumes:
      - hirebridge_data:/data

volumes:
  hirebridge_data:
