name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -tags "sqlite_fts5 sqlite_load_extension" \
            -ldflags="-s -w" \
            -o hirebridge \
            ./cmd/hirebridge

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10"

          echo "--- Test SSH ---"
          ssh $SSH_OPTS $SSH_USER@$SSH_HOST "echo connected"

          echo "--- Stop service ---"
          ssh $SSH_OPTS $SSH_USER@$SSH_HOST "sudo systemctl stop hirebridge || true"

          echo "--- Upload binary ---"
          scp $SSH_OPTS hirebridge $SSH_USER@$SSH_HOST:/tmp/hirebridge.new

          echo "--- Install binary ---"
          ssh $SSH_OPTS $SSH_USER@$SSH_HOST "sudo mv /tmp/hirebridge.new /opt/hirebridge/hirebridge && sudo chmod +x /opt/hirebridge/hirebridge && sudo chown hirebridge:hirebridge /opt/hirebridge/hirebridge && sudo mkdir -p /opt/hirebridge/data /opt/hirebridge/certs /app/ext && sudo chown hirebridge:hirebridge /opt/hirebridge/data /opt/hirebridge/certs"

      - name: Write config
        env:
          SMTP_PASS: ${{ secrets.HIREBRIDGE_SMTP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.HIREBRIDGE_NODE_ADMIN_EMAIL }}
        # NOTE: no heredoc here — an unindented terminator breaks the YAML
        # block scalar (the workflow failed to parse for every run before
        # this was switched to a brace group).
        run: |
          {
            echo "HB_BASE_URL=https://hirebridge.dev"
            echo "HB_LISTEN=:8080"
            echo "HB_DB_PATH=/opt/hirebridge/data/hirebridge.db"
            echo "HB_VEC0_PATH=/app/ext/vec0.so"
            echo "HB_EMBED_DIM=384"
            echo "HB_TLS_DOMAIN=hirebridge.dev"
            echo "HB_MAILER_PROVIDER=smtp"
            echo "HB_SMTP_HOST=smtp.purelymail.com"
            echo "HB_SMTP_PORT=587"
            echo "HB_SMTP_USER=noreply@hirebridge.dev"
            echo "HB_SMTP_PASS=${SMTP_PASS}"
            echo "HB_SMTP_FROM=noreply@hirebridge.dev"
            echo "HB_FEDERATION_ENABLED=true"
            echo "HB_FEDERATION_PORT=:8400"
            echo "HB_FEDERATION_INSTANCE_NAME=hirebridge-dev"
            echo "HB_FEDERATION_KEY_PATH=/opt/hirebridge/data/federation_key.json"
            echo "HB_FEDERATION_ENDPOINT=http://hirebridge.dev:8400"
            echo "HB_FEDERATION_DISCOVERY_URL=http://hirebridge.dev:8400"
            echo "HB_FEDERATION_SYNC_INTERVAL=5m"
            echo "HB_ADMIN_EMAIL=${ADMIN_EMAIL}"
          } > /tmp/hirebridge.env

      - name: Upload config and restart
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10"
          scp $SSH_OPTS /tmp/hirebridge.env $SSH_USER@$SSH_HOST:/tmp/hirebridge.env
          ssh $SSH_OPTS $SSH_USER@$SSH_HOST "sudo cp /tmp/hirebridge.env /opt/hirebridge/.env && sudo chmod 600 /opt/hirebridge/.env && sudo chown hirebridge:hirebridge /opt/hirebridge/.env && sudo systemctl start hirebridge"

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 $SSH_USER@$SSH_HOST \
            "sleep 2 && curl -sf http://localhost:80/healthz && echo ' HTTP' && curl -sfk https://localhost/healthz && echo ' HTTPS'"