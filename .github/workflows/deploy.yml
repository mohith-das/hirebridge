name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -tags "sqlite_fts5 sqlite_load_extension" \
            -ldflags="-s -w" \
            -o hirebridge \
            ./cmd/hirebridge

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 $SSH_USER@$SSH_HOST"

          echo "::group::Test SSH"
          $SSH "echo connected && uname -a"
          echo "::endgroup::"

          echo "::group::Upload binary"
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=10 \
            hirebridge $SSH_USER@$SSH_HOST:/opt/hirebridge/hirebridge.new
          echo "::endgroup::"

          echo "::group::Write config & restart"
          $SSH "sudo tee /opt/hirebridge/.env > /dev/null" <<ENVEOF
HB_BASE_URL=https://hirebridge.dev
HB_LISTEN=:8080
HB_DB_PATH=/opt/hirebridge/data/hirebridge.db
HB_VEC0_PATH=/app/ext/vec0.so
HB_EMBED_DIM=384
HB_TLS_DOMAIN=hirebridge.dev
HB_MAILER_PROVIDER=smtp
HB_SMTP_HOST=smtp.purelymail.com
HB_SMTP_PORT=587
HB_SMTP_USER=noreply@hirebridge.dev
HB_SMTP_PASS=${{ secrets.HIREBRIDGE_SMTP_PASSWORD }}
HB_SMTP_FROM=noreply@hirebridge.dev
HB_FEDERATION_ENABLED=true
HB_FEDERATION_PORT=:8400
HB_FEDERATION_INSTANCE_NAME=hirebridge-dev
HB_FEDERATION_ENDPOINT=http://hirebridge.dev:8400
HB_FEDERATION_DISCOVERY_URL=http://hirebridge.dev:8400
HB_FEDERATION_SYNC_INTERVAL=5m
ENVEOF

          $SSH "sudo bash -c '
            set -e
            mkdir -p /opt/hirebridge/data /opt/hirebridge/certs /app/ext
            chmod 600 /opt/hirebridge/.env
            chown hirebridge:hirebridge /opt/hirebridge/.env
            systemctl stop hirebridge || true
            mv /opt/hirebridge/hirebridge.new /opt/hirebridge/hirebridge
            chmod +x /opt/hirebridge/hirebridge
            chown hirebridge:hirebridge /opt/hirebridge/hirebridge
            systemctl start hirebridge
            sleep 2
            systemctl status hirebridge --no-pager | head -5
          '"
          echo "::endgroup::"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -sf http://localhost:8080/healthz && echo ' OK' || echo ' FAIL'"
