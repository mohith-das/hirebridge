name: release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: linux, arch: amd64, goos: linux, goarch: amd64 }
          - { os: linux, arch: arm64, goos: linux, goarch: arm64 }
          - { os: darwin, arch: amd64, goos: darwin, goarch: amd64 }
          - { os: darwin, arch: arm64, goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags "sqlite_fts5 sqlite_load_extension" \
            -ldflags="-s -w" \
            -o hirebridge-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/hirebridge

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hirebridge-${{ matrix.os }}-${{ matrix.arch }}
          path: hirebridge-${{ matrix.os }}-${{ matrix.arch }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          find artifacts -type f -exec mv {} . \;
          ls -lh hirebridge-*
          sha256sum hirebridge-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hirebridge-*
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
